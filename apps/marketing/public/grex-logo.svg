<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!--
    Grex brand mark — a "G" built from the two-tone identity:
    a blue ring opening at the upper-right (#0359FC) with the teal
    crossbar/spur (#02CCA4) that turns the C into a G. Single colored
    mark; reads on both light and dark backgrounds.
  -->
  <path
    d="M82.87 52.88 A33 33 0 1 1 71.21 24.72"
    stroke="#0359FC"
    stroke-width="14"
    stroke-linecap="round"
    fill="none"
  />
  <path
    d="M50 50 H72"
    stroke="#02CCA4"
    stroke-width="14"
    stroke-linecap="round"
    fill="none"
  />
</svg>
