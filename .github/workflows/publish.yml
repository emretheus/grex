name: Publish Release

# Release publish. Matrix/jobs produce:
#   - macOS aarch64 DMG + .app.tar.gz updater artifact
#   - macOS x86_64 DMG + .app.tar.gz updater artifact
#   - Windows x86_64 NSIS installer + updater artifact
# tauri-action@v0.6 merges each runner's per-platform entry into the same
# latest.json on the release.

on:
  workflow_dispatch:
    inputs:
      draft:
        description: "Create the GitHub release as a draft"
        required: false
        default: true
        type: boolean
  push:
    tags:
      - "v*"

concurrency:
  # One publish per tag ref at a time. tauri-action merges latest.json
  # atomically across matrix entries so concurrent matrix jobs within one
  # workflow run are fine — we just want to reject retries of the same tag
  # racing with the original run.
  group: publish-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  CI: true

jobs:
  preflight:
    name: Release Preflight
    # macos-26 ensures the bundled binary links against macOS 26 SDK; pre-26
    # SDK targets get Tahoe's legacy compat scrollbar rendering (always-on bg).
    runs-on: macos-26
    outputs:
      version: ${{ steps.version.outputs.version }}
      release_body: ${{ steps.notes.outputs.release_body }}
      draft: ${{ steps.release-mode.outputs.draft }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js

      - name: Verify release config
        run: |
          bun run release:verify
          test -n "${GREX_UPDATER_PUBKEY}"
          test -n "${GREX_UPDATER_ENDPOINTS}"
          test -n "${TAURI_SIGNING_PRIVATE_KEY}"
        env:
          GREX_UPDATER_PUBKEY: ${{ secrets.GREX_UPDATER_PUBKEY }}
          GREX_UPDATER_ENDPOINTS: ${{ secrets.GREX_UPDATER_ENDPOINTS }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Read version
        id: version
        run: |
          version=$(node -p "require('./package.json').version")
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Validate pushed tag matches app version
        if: github.ref_type == 'tag'
        run: |
          expected="v${{ steps.version.outputs.version }}"
          if [ "${GITHUB_REF_NAME}" != "${expected}" ]; then
            echo "Tag ${GITHUB_REF_NAME} does not match app version ${expected}"
            exit 1
          fi

      - name: Extract release notes
        id: notes
        run: |
          {
            echo 'release_body<<EOF'
            bun run release:notes -- "${{ steps.version.outputs.version }}"
            echo 'EOF'
          } >> "$GITHUB_OUTPUT"

      - name: Resolve release mode
        id: release-mode
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "draft=${{ inputs.draft }}" >> "$GITHUB_OUTPUT"
          else
            echo "draft=false" >> "$GITHUB_OUTPUT"
          fi

  build-and-publish:
    name: Build and Publish macOS (${{ matrix.target-triple }})
    needs: preflight
    strategy:
      fail-fast: false
      matrix:
        include:
          - target-triple: aarch64-apple-darwin
            tauri-args: "--target aarch64-apple-darwin"
          - target-triple: x86_64-apple-darwin
            tauri-args: "--target x86_64-apple-darwin"
    runs-on: macos-26
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js

      - name: Add Rust target for Intel macOS cross-build
        if: matrix.target-triple == 'x86_64-apple-darwin'
        shell: bash
        run: rustup target add x86_64-apple-darwin

      - name: Setup Rust Tauri
        uses: ./.github/actions/setup-rust-tauri

      - name: Cache bundle archives
        uses: ./.github/actions/cache-bundle-archives
        with:
          target-triple: ${{ matrix.target-triple }}

      - name: Build + stage bundle binaries
        uses: ./.github/actions/build-sidecar
        with:
          target-triple: ${{ matrix.target-triple }}

      - name: Prepare macOS signing keychain
        id: signing
        env:
          # Reuses the Developer ID Application cert stored under the
          # electron-builder secret names (base64 .p12 + its password).
          APPLE_CERTIFICATE: ${{ secrets.CSC_LINK }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          OUTPUT_FORMAT: github
        run: |
          chmod +x scripts/prepare-macos-signing.sh scripts/cleanup-macos-signing.sh
          scripts/prepare-macos-signing.sh >> "$GITHUB_OUTPUT"

      - name: Write App Store Connect API key
        id: asc
        env:
          APPLE_API_KEY_CONTENT: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          key_path="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"
          # APPLE_API_KEY may hold the raw .p8 PEM or a base64 blob of it.
          if printf '%s' "${APPLE_API_KEY_CONTENT}" | grep -q "BEGIN PRIVATE KEY"; then
            printf '%s' "${APPLE_API_KEY_CONTENT}" > "${key_path}"
          else
            printf '%s' "${APPLE_API_KEY_CONTENT}" | base64 --decode > "${key_path}"
          fi
          echo "key_path=${key_path}" >> "$GITHUB_OUTPUT"

      - name: Build and publish (${{ matrix.target-triple }})
        id: tauri
        uses: tauri-apps/tauri-action@v0.6
        env:
          TAURI_TARGET_TRIPLE: ${{ matrix.target-triple }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Notarization via App Store Connect API key (issuer + key id + .p8).
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_KEY_PATH: ${{ steps.asc.outputs.key_path }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_KEYCHAIN_PATH: ${{ steps.signing.outputs.APPLE_KEYCHAIN_PATH }}
          APPLE_KEYCHAIN_PASSWORD: ${{ steps.signing.outputs.APPLE_KEYCHAIN_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.CSC_LINK }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GREX_UPDATER_PUBKEY: ${{ secrets.GREX_UPDATER_PUBKEY }}
          GREX_UPDATER_ENDPOINTS: ${{ secrets.GREX_UPDATER_ENDPOINTS }}
        with:
          tagName: v__VERSION__
          releaseName: Grex v__VERSION__
          releaseBody: ${{ needs.preflight.outputs.release_body }}
          releaseDraft: ${{ needs.preflight.outputs.draft == 'true' }}
          prerelease: false
          includeUpdaterJson: true
          args: ${{ matrix.tauri-args }}
          # Force tauri-action to use bun instead of auto-detecting (it only knows npm/yarn/pnpm)
          tauriScript: bun run tauri

      - name: Verify bundled CLI (${{ matrix.target-triple }})
        shell: bash
        run: |
          bash scripts/verify-bundled-cli.sh \
            "src-tauri/target/${{ matrix.target-triple }}/release/bundle/macos/Grex.app"

      - name: Cleanup macOS signing keychain
        if: always()
        run: |
          if [ -n "${{ steps.signing.outputs.APPLE_KEYCHAIN_PATH }}" ]; then
            scripts/cleanup-macos-signing.sh "${{ steps.signing.outputs.APPLE_KEYCHAIN_PATH }}"
          fi

  build-and-publish-windows:
    name: Build and Publish Windows (x86_64-pc-windows-msvc)
    needs: preflight
    runs-on: windows-latest
    timeout-minutes: 60
    env:
      # src-tauri/.cargo/config.toml sets rustc-wrapper = "sccache" for the
      # macOS jobs; Windows runners don't install it, so clear the wrapper.
      RUSTC_WRAPPER: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup JS toolchain
        uses: ./.github/actions/setup-js
        with:
          install-sccache: "false"

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # boring-sys2 (transitive native dep) assembles with NASM on Windows.
      - name: Setup NASM
        uses: ilammy/setup-nasm@v1

      - name: Cache Rust artifacts
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: windows-tauri-v1
          workspaces: src-tauri -> target

      - name: Cache bundle archives
        uses: ./.github/actions/cache-bundle-archives
        with:
          target-triple: x86_64-pc-windows-msvc

      # tauri-action's beforeBuildCommand runs prepare-sidecar.mjs, which
      # stages the win32 vendor tree, builds the bun sidecar + grex-cli,
      # then bundles. NSIS only; WiX/MSI is not part of what Grex ships.
      - name: Build and publish Windows NSIS
        id: tauri
        uses: tauri-apps/tauri-action@v0.6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          GREX_UPDATER_PUBKEY: ${{ secrets.GREX_UPDATER_PUBKEY }}
          GREX_UPDATER_ENDPOINTS: ${{ secrets.GREX_UPDATER_ENDPOINTS }}
        with:
          tagName: v__VERSION__
          releaseName: Grex v__VERSION__
          releaseBody: ${{ needs.preflight.outputs.release_body }}
          releaseDraft: ${{ needs.preflight.outputs.draft == 'true' }}
          prerelease: false
          includeUpdaterJson: true
          args: --bundles nsis
          tauriScript: bun run tauri

  notify-marketing:
    name: Notify marketing site
    needs: [preflight, build-and-publish, build-and-publish-windows]
    if: needs.preflight.outputs.draft == 'false'
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - name: Revalidate grex.ai
        env:
          SECRET: ${{ secrets.GREX_MARKETING_REVALIDATE_SECRET }}
        run: |
          if [ -z "${SECRET}" ]; then
            echo "GREX_MARKETING_REVALIDATE_SECRET not set; skipping"
            exit 0
          fi
          curl --fail --silent --show-error \
            --retry 3 --retry-delay 10 --retry-connrefused \
            -X POST "https://grex.ai/api/revalidate" \
            -H "x-revalidate-secret: ${SECRET}" \
            -H "content-type: application/json"
