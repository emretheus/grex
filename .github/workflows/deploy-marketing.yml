name: Deploy Marketing Site

# Builds the Astro marketing site (apps/marketing) and publishes it to GitHub
# Pages. Runs on every push to main that touches the marketing app, and can be
# triggered manually.

on:
  push:
    branches:
      - main
    paths:
      - "apps/marketing/**"
      - ".github/workflows/deploy-marketing.yml"
  workflow_dispatch:

# Allow the workflow to publish to Pages via OIDC; no extra secrets needed.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one deploy at a time; let an in-progress run finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: package.json

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build marketing site
        working-directory: apps/marketing
        env:
          MARKETING_SITE_URL: https://codewit.xyz
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/marketing/dist

  deploy:
    name: Deploy
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
