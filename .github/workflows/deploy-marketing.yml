name: Deploy marketing site

# Builds apps/marketing as a Next.js static export and deploys it to GitHub
# Pages (custom domain grex.codes, served at the apex root). Replaces the old
# Vercel/ISR setup. The GitHub data is fetched at build time, so a release
# rebuild keeps the version / commit current without a runtime revalidation
# server (see apps/marketing/lib/github.ts).

on:
  push:
    branches: [main]
    paths:
      - "apps/marketing/**"
      - ".github/workflows/deploy-marketing.yml"
  # A published release does NOT fire this workflow directly: publish.yml
  # creates the GitHub release via the default GITHUB_TOKEN, and GitHub
  # suppresses workflow runs triggered by GITHUB_TOKEN events (recursion
  # guard). So we listen for the "Publish Release" workflow finishing instead
  # — workflow_run is exempt from that suppression and fires reliably. This is
  # what keeps the baked-in version / download links current on each release.
  workflow_run:
    workflows: ["Publish Release"]
    types: [completed]
  workflow_dispatch:

# deploy-pages needs Pages write + OIDC id-token.
permissions:
  contents: read
  pages: write
  id-token: write

# Never run two deploys at once; let a newer push cancel an in-flight build.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    # When triggered by a Publish Release completion, only deploy if it
    # actually succeeded — don't push a half-built release to grex.codes.
    # push / workflow_dispatch carry no workflow_run payload, so they pass.
    # (publish.yml always sets prerelease: false, so every published release
    # is the stable "latest" the marketing site tracks.)
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.2"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      # Monorepo: install once at the root so the @grex/marketing workspace
      # and its deps resolve. --frozen-lockfile guarantees CI matches bun.lock.
      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build static export
        working-directory: apps/marketing
        env:
          # Lifts the anonymous 60 req/hr GitHub API cap to 5000. Falls back to
          # bundled defaults if absent — the build never fails on API errors.
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/marketing/out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
